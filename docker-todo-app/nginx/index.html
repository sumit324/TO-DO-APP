<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Docker Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 16px; }
    .card { background: #fff; border-radius: 12px; padding: 32px; max-width: 500px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
    h1 { font-size: 1.5rem; margin-bottom: 24px; color: #1a1a2e; }
    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; }
    button.add { padding: 10px 18px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
    button.add:hover { background: #4338ca; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    li { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 8px; }
    li.done span.task { text-decoration: line-through; color: #9ca3af; }
    span.task { flex: 1; font-size: 15px; color: #374151; }
    button.del { background: none; border: none; cursor: pointer; color: #ef4444; font-size: 18px; }
    button.del:hover { color: #b91c1c; }
    input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #4f46e5; }
    .empty { color: #9ca3af; text-align: center; padding: 20px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📝 Docker Todo App</h1>
    <div class="input-row">
      <input id="taskInput" type="text" placeholder="Add a new task..." onkeydown="if(event.key==='Enter')addTodo()" />
      <button class="add" onclick="addTodo()">Add</button>
    </div>
    <ul id="todoList"><li class="empty">Loading...</li></ul>
  </div>

  <script>
    const API = "/api";

    async function fetchTodos() {
      const res = await fetch(`${API}/todos`);
      const todos = await res.json();
      render(todos);
    }

    function render(todos) {
      const ul = document.getElementById("todoList");
      if (todos.length === 0) {
        ul.innerHTML = '<li class="empty">No tasks yet. Add one above!</li>';
        return;
      }
      ul.innerHTML = todos.map(t => `
        <li class="${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id}, this.checked)" />
          <span class="task">${t.task}</span>
          <button class="del" onclick="deleteTodo(${t.id})">✕</button>
        </li>`).join("");
    }

    async function addTodo() {
      const input = document.getElementById("taskInput");
      const task = input.value.trim();
      if (!task) return;
      await fetch(`${API}/todos`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({task}) });
      input.value = "";
      fetchTodos();
    }

    async function toggleTodo(id, done) {
      await fetch(`${API}/todos/${id}`, { method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify({done}) });
      fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/todos/${id}`, { method: "DELETE" });
      fetchTodos();
    }

    fetchTodos();
  </script>
</body>
</html>
